<div class="modal-overlay" id="dish-modal" onclick="closeDishDetails()">
    <div class="modal-content" onclick="event.stopPropagation()">
        
        <div style="position: relative; width: 100%; height: 220px; flex-shrink: 0; overflow: hidden;">
            <button class="close-icon" onclick="closeDishDetails()">&times;</button>
            <img class="modal-img" id="modal-img" src="" style="width: 100%; height: 100%; object-fit: cover;">
            
            <div id="admin-image-edit" style="display:none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 15px; transition: 0.3s;">
                <button class="primary-btn" style="width: auto; padding: 10px 20px; font-size: 14px;" onclick="document.getElementById('file-input').click()">
                    更换菜品图片
                </button>
                <button class="outline-btn" style="width: auto; padding: 8px 15px; font-size: 13px; background: rgba(255,255,255,0.2); color: white; border: none;" onclick="removeDishImage()">
                    移除图片
                </button>
            </div>
        </div>

        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">

        <div class="modal-body">
            <div class="modal-title-row">
                <h2 id="modal-title">菜名加载中...</h2>
                <div class="fav-btn" id="fav-btn" onclick="toggleFavorite()">🤍 收藏</div>
            </div>
            
            <div id="modal-price" class="modal-section" style="margin-bottom: 20px;">
            </div>
            
            <div class="modal-section">
                <h4> 原料 Ingredients </h4>
                <div id="modal-ingredients" style="margin-top: 10px;">
                    </div>
            </div>
            
            <div class="modal-section">
                <h4> 步骤 Steps </h4>
                <div id="modal-steps" style="margin-top: 10px;">
                    </div>
            </div>

            <div class="modal-section" id="modal-tips-area" style="display:none; background:#fff9e6; padding:15px; border-radius:15px; margin-top: 10px; border: 1px solid #ffeaa7;">
                </div>
        </div>
        
        <div class="modal-footer">
            <button class="primary-btn" style="width: 90%;" onclick="closeDishDetails()">
                保存并返回菜单
            </button>
        </div>
    </div>
</div>
