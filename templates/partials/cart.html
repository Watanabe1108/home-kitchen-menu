<div id="view-cart" class="main-view">
    <div style="display: flex; align-items: center; padding: 15px 20px; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10;">
        <div onclick="switchTab('view-menu', document.querySelectorAll('.nav-item')[0])" 
             style="font-size: 24px; padding-right: 15px; cursor: pointer; color: #333;">
            ←
        </div>
        <div style="flex: 1; font-weight: bold; text-align: center; font-size: 17px; margin-right: 35px;">确认菜单</div>
    </div>

    <div id="cart-items-container" style="padding: 15px; flex: 1; overflow-y: auto;"></div>

    <div style="padding: 20px; background: #fff; border-top: 1px solid #eee; box-shadow: 0 -4px 10px rgba(0,0,0,0.02);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span style="color: #999; font-size: 14px;">预计总额</span>
            <span id="cart-total" style="color: #ff4757; font-weight: bold; font-size: 24px;">$0.00</span>
        </div>
        
        <button class="primary-btn" 
                style="width: 100%; height: 52px; border-radius: 26px; font-size: 17px; letter-spacing: 1px;" 
                onclick="handlePlaceOrderAttempt()">
            确认下单
        </button>
    </div>
</div>
