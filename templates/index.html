<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Scarlett和Cris的小厨房</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="toast">提示消息</div>
    <div id="app-wrapper" style="display: flex; height: 100vh; flex-direction: column;">
        <div class="header">
            <img src="https://via.placeholder.com/100">
            <h1>Scarlett和Cris的小厨房</h1>
        </div>
        <div class="cart-fab" onclick="switchTab('view-cart', null)" id="cart-fab">
            🛒<div class="cart-badge" id="cart-badge">0</div>
        </div>

        <div id="view-menu" class="main-container" style="display: flex;">
            {% include 'partials/sidebar.html' %}
            {% include 'partials/menu.html' %}
        </div>

        {% include 'partials/cart.html' %}
        {% include 'partials/order.html' %}
        {% include 'partials/profile.html' %}
        {% include 'partials/footer.html' %}
    </div>

    {% include 'partials/modal.html' %}
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
